name: Day Watcher

on:
  # PRIMARY TRIGGER — external cron via cron-job.org POSTs to GitHub's
  # /repos/{owner}/{repo}/dispatches API every 5 min during US market
  # hours (Mon-Fri). External cron is required because GH Actions
  # free-tier scheduler is best-effort and drops the vast majority of
  # */5 ticks (observed: ~1 fire/day vs ~80 expected).
  repository_dispatch:
    types: [day-watcher-tick]
  # BACKUP — keep the native schedule too. When external cron is up
  # both triggers fire and the second one cheaply no-ops on the
  # already-running scan. When external cron is down, the native
  # schedule provides at least some coverage.
  schedule:
    - cron: '*/5 13-20 * * 1-5'
  # MANUAL — for test_ping and ad-hoc verification.
  workflow_dispatch:
    inputs:
      test_ping:
        description: 'Send a Telegram test ping instead of running the scan'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram test ping
        if: github.event.inputs.test_ping == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "import sys; from src.notifier import send_alert; sys.exit(0 if send_alert('🧪 day-watcher → Telegram pipeline test (workflow_dispatch test_ping=true).') else 1)"

      - name: Run day watcher
        if: github.event.inputs.test_ping != 'true'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER_TRADE: ${{ secrets.ALPACA_PAPER_TRADE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # D4 kill switch — set this GitHub Secret to "true" to enable
          # auto-execution of qualifying setups. Anything else (unset,
          # "false", empty) keeps the watcher in alerts-only mode.
          # Hard-refused unless ALPACA_PAPER_TRADE=True — see
          # src/day_trader.py:day_auto_execute_enabled().
          WATCHER_DAY_AUTO_EXECUTE: ${{ secrets.WATCHER_DAY_AUTO_EXECUTE }}
          # Self-heal heartbeat — healthchecks.io ping URL. On each clean
          # scan the watcher pings this; if scans stop (runner/billing
          # outage, crash) healthchecks.io alerts you directly. Unset = the
          # heartbeat silently no-ops. See src/heartbeat.py.
          HEALTHCHECK_PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: python -m src.day_watcher

name: Refresh day-trade calendars

# Owns state/earnings.json and state/econ_events.json. Runs once a week
# Sunday 06:00 UTC (= Sat 02:00 ET = Sun 09:00 EAT) so refreshed files are
# in place before Monday's pre-market scan. The day-watcher fails closed
# (refuses entries) if either file is >10 days old, so two consecutive
# failed Sundays trip the safety brake.

on:
  schedule:
    - cron: '0 6 * * 0'   # Sunday 06:00 UTC
  workflow_dispatch:
    inputs:
      stub_only:
        description: 'Skip Finnhub/BLS, just refresh timestamps (smoke-test the workflow)'
        type: boolean
        default: false

permissions:
  contents: write   # commits the refreshed JSON back to master

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh calendars
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          REFRESH_DAY_CALENDARS_FORCE: ${{ github.event.inputs.stub_only == 'true' && 'stub-only' || '' }}
        run: python scripts/refresh_day_calendars.py

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ -n "$(git status --porcelain state/earnings.json state/econ_events.json)" ]; then
            git add state/earnings.json state/econ_events.json
            git commit -m "chore: refresh day-trade calendars ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No calendar changes — skipping commit."
          fi

      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "import sys; from src.notifier import send_alert; sys.exit(0 if send_alert('⚠️ refresh-day-calendars FAILED — day-watcher will start refusing new entries once state files exceed 10 days. Check the workflow logs.') else 1)"

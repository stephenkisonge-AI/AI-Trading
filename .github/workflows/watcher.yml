name: Daily Watcher

on:
  schedule:
    # 03:02 UTC = 06:02 EAT (Nairobi).
    # +2 min buffer so the daily candle has settled before we scan.
    - cron: '2 3 * * *'
  workflow_dispatch:
    inputs:
      test_ping:
        description: 'Send a Telegram test ping instead of running the scan'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram test ping
        if: github.event.inputs.test_ping == 'true'
        run: |
          python -c "import sys; from src.notifier import send_alert; sys.exit(0 if send_alert('🧪 GitHub Actions → Telegram pipeline test. (workflow_dispatch with test_ping=true.)') else 1)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run watcher
        if: github.event.inputs.test_ping != 'true'
        run: python -m src.watcher
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER_TRADE: ${{ secrets.ALPACA_PAPER_TRADE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

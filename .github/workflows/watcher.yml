name: Watcher

on:
  schedule:
    # Primary: every 4 hours at :17 UTC (00:17, 04:17, 08:17, 12:17,
    # 16:17, 20:17). Aligned with the strategy's 4H setup-confirmation
    # timeframe so each scan sees a freshly-closed 4H candle. Off-the-hour
    # minute dodges GitHub Actions free-tier scheduler lag at :00.
    - cron: '17 */4 * * *'
    # Fallback: 14:00 UTC = 17:00 EAT. Fires only if NO scheduled run
    # succeeded earlier today — guarded below via gh api lookup. With 6
    # primary scans/day this almost always skips; it exists to cover the
    # (rare) day when free-tier scheduler drops every single one.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      test_ping:
        description: 'Send a Telegram test ping instead of running the scan'
        type: boolean
        default: false

permissions:
  contents: read
  actions: read   # fallback guard needs to query workflow runs

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram test ping
        if: github.event.inputs.test_ping == 'true'
        run: |
          python -c "import sys; from src.notifier import send_alert; sys.exit(0 if send_alert('🧪 GitHub Actions → Telegram pipeline test. (workflow_dispatch with test_ping=true.)') else 1)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Skip fallback if primary already ran today
        id: guard
        if: github.event.schedule == '0 14 * * *'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(date -u +%Y-%m-%d)
          count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/watcher.yml/runs?event=schedule&status=success&per_page=20" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"${today}\"))] | length")
          echo "today=${today}"
          echo "successful_schedule_runs_today=${count}"
          if [ "${count}" -gt 0 ]; then
            echo "Primary already ran today — skipping fallback."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No successful schedule run today — running fallback."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run watcher
        if: github.event.inputs.test_ping != 'true' && steps.guard.outputs.skip != 'true'
        run: python -m src.watcher
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER_TRADE: ${{ secrets.ALPACA_PAPER_TRADE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WATCHER_RUN_KIND: ${{ github.event.schedule == '0 14 * * *' && 'fallback' || 'primary' }}
          # Phase 5a kill switch: set this GitHub Secret to "true" to enable
          # auto-execution of qualifying setups. Anything else (unset, "false",
          # etc.) keeps the watcher in alerts-only mode. Auto-execute also
          # requires ALPACA_PAPER_TRADE=True — live trading is never automated.
          WATCHER_AUTO_EXECUTE: ${{ secrets.WATCHER_AUTO_EXECUTE }}
